name: Build & Release APK

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: Inject .env com URL do servidor
        run: echo "HTTPS_SERVER_URL = ${{ secrets.HTTPS_SERVER_URL }}" > camus_app/.env

      - name: Instalar dependências Flutter
        working-directory: camus_app
        run: flutter pub get

      - name: Build APK release
        working-directory: camus_app
        run: flutter build apk --release

      - name: Gerar tag da release
        id: ver
        run: |
          VERSION=$(grep '^version:' camus_app/pubspec.yaml | awk '{print $2}')
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "tag=v${VERSION}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "name=v${VERSION}" >> $GITHUB_OUTPUT

      - name: Criar GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.name }}
          files: camus_app/build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
